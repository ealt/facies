<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Facies — Visual Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #fff; font-family: 'Inter Tight', sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="FieldNotebook.jsx"></script>
<script type="text/babel" src="BloombergTerminal.jsx"></script>
<script type="text/babel" src="Minimap.jsx"></script>

<script type="text/babel">
function Canvas() {
  return (
    <DesignCanvas title="Facies — Three Visual Directions">
      <DCSection id="dir1" title="Direction 1 — Field Notebook" subtitle="Warm dark canvas, sepia/ochre palette, serif italic display, mono everywhere else. Brand affect: USGS field report, geological survey notebook. Data presented as observation, not metric.">
        <DCArtboard id="fn-dash" label="Overview · Field Notebook" width={1280} height={760}>
          <FieldNotebook />
        </DCArtboard>
      </DCSection>

      <DCSection id="dir2" title="Direction 2 — Bloomberg Terminal" subtitle="Pure black canvas, monospace everywhere, amber accent, dense info, no visual softness. Reads like a trading terminal. Maximum information density per square inch.">
        <DCArtboard id="bt-dash" label="Overview · Bloomberg Terminal" width={1280} height={760}>
          <BloombergTerminal />
        </DCArtboard>
      </DCSection>

      <DCSection id="dir3" title="Direction 3 — Minimap" subtitle="Crisp high-contrast cool dark, restrained single-hue palette built around layered translucency. The stratigraphy chart IS the brand. Modern, almost cartographic.">
        <DCArtboard id="mm-dash" label="Overview · Minimap" width={1280} height={760}>
          <Minimap />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Canvas/>);
</script>
</body>
</html>
