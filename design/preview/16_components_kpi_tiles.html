<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>KPI Tiles</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .t { border: 1px solid var(--border); border-radius: 10px; padding: 12px; background: var(--card); }
  .l { font-size: 12px; color: var(--muted-foreground); }
  .v { font-size: 18px; font-weight: 600; margin-top: 2px; }
  .v.green { color: #4ade80; }
  .sub { font-size: 10px; color: var(--muted-foreground); margin-top: 2px; }
</style></head><body><div class="card">
  <div class="grid">
    <div class="t"><div class="l">Total Cost</div><div class="v">$4.27</div></div>
    <div class="t"><div class="l">Input Tokens</div><div class="v">3.2M</div><div class="sub">Fresh: 412K, Cache read: 2.6M, Cache create: 188K</div></div>
    <div class="t"><div class="l">Cache Hit Rate</div><div class="v">87.4%</div></div>
    <div class="t"><div class="l">Saved by Caching</div><div class="v green">$12.81</div></div>
    <div class="t"><div class="l">Avg Cost/Turn</div><div class="v">$0.043</div></div>
    <div class="t"><div class="l">API Calls</div><div class="v">126</div></div>
  </div>
</div></body></html>
