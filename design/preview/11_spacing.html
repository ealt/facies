<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .row { display:flex; align-items:center; gap: 12px; padding: 4px 0; }

  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); width: 90px; }
  .v { font-family: var(--font-mono); font-size: 11px; width: 50px; text-align: right; color: var(--foreground); }
</style></head><body><div class="card">
  <div class="row"><div class="lab">space-1</div><div class="bar" style="width:4px"></div><div class="v">4px</div></div>
  <div class="row"><div class="lab">space-2</div><div class="bar" style="width:8px"></div><div class="v">8px</div></div>
  <div class="row"><div class="lab">space-3</div><div class="bar" style="width:12px"></div><div class="v">12px</div></div>
  <div class="row"><div class="lab">space-4</div><div class="bar" style="width:16px"></div><div class="v">16px</div></div>
  <div class="row"><div class="lab">space-6</div><div class="bar" style="width:24px"></div><div class="v">24px</div></div>
  <div class="row"><div class="lab">header-h</div><div class="bar" style="width:48px;height:24px;"></div><div class="v">48px</div></div>
</div></body></html>
