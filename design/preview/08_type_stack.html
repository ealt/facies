<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Type Stack</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .blk { padding: 12px; border: 1px solid var(--border); border-radius: 8px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .sans { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
</style></head><body><div class="card">
  <div class="row">
    <div class="blk">
      <div class="lab">--font-sans</div>
      <div class="sans" style="font-size:24px; font-weight:600; letter-spacing:-0.02em;">Facies</div>
      <div class="sans" style="font-size:14px; margin-top:4px;">Context Window Composition</div>
      <div class="sans" style="font-size:12px; color:var(--muted-foreground); margin-top:2px;">Peak Context · 1.2M tokens</div>
    </div>
    <div class="blk">
      <div class="lab">--font-mono</div>
      <div class="mono" style="font-size:14px;">claude-3-5-sonnet</div>
      <div class="mono" style="font-size:12px; margin-top:6px;">total_tokens &gt; 1M AND project = "ds"</div>
      <div class="mono" style="font-size:11px; color:var(--muted-foreground); margin-top:4px;">~340K · $0.043 · 12s</div>
    </div>
  </div>
</div></body></html>
