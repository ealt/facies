<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Borders & Shadows</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .b { background: var(--card); border-radius: 10px; padding: 16px; height: 80px; display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
  .b1 { border: 1px solid var(--border); }
  .b2 { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.4), 0 4px 6px -4px rgb(0 0 0 / 0.4); }
</style></head><body><div class="card">
  <div class="row">
    <div class="b b1">1px border · default card</div>
    <div class="b b2">shadow-lg · tooltips only</div>
  </div>
  <div class="section-title" style="margin-top:14px;">borders structure the UI · shadows are reserved for floating chrome</div>
</div></body></html>
