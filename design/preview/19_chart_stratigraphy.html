<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Stratigraphy Chart</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .wrap { border: 1px solid var(--border); border-radius: 10px; padding: 16px; background: var(--card); }
  .h { display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .title { font-size: 13px; font-weight: 500; }
  .est { font-size: 10px; color: var(--muted-foreground); margin-left: 6px; }
</style></head><body><div class="card">
  <div class="wrap">
    <div class="h"><div class="title">Context Window Composition <span class="est">~estimated breakdown</span></div></div>
    <svg width="100%" height="220" viewBox="0 0 660 220" preserveAspectRatio="none">
      <!-- stacked area, hand-drawn -->
      <path d="M0,200 L660,200 L660,170 L0,170 Z" fill="#6b7280" opacity="0.8"/>
      <path d="M0,170 L660,170 L660,90 Q500,80 400,100 Q280,120 0,110 Z" fill="#3b82f6" opacity="0.8"/>
      <path d="M0,110 L660,90 L660,60 Q500,55 380,68 Q260,82 0,80 Z" fill="#22c55e" opacity="0.8"/>
      <path d="M0,80 L660,60 L660,40 Q500,38 380,46 Q260,54 0,55 Z" fill="#f97316" opacity="0.8"/>
      <path d="M0,55 L660,40 L660,28 Q500,28 380,32 Q260,36 0,38 Z" fill="#f59e0b" opacity="0.8"/>
      <!-- compaction line -->
      <line x1="320" y1="0" x2="320" y2="200" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>
      <text x="324" y="14" fill="#ef4444" font-size="10">1.2M → ~340K</text>
      <!-- y axis ticks -->
      <g font-family="ui-monospace,monospace" font-size="9" fill="#888">
        <text x="-2" y="200" text-anchor="end">0</text>
        <text x="-2" y="140" text-anchor="end">500K</text>
        <text x="-2" y="80" text-anchor="end">1M</text>
        <text x="-2" y="20" text-anchor="end">1.5M</text>
      </g>
    </svg>
    <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:6px; font-size:10px; color: var(--muted-foreground);">
      <span><span style="display:inline-block;width:8px;height:8px;background:#6b7280;border-radius:2px;vertical-align:middle;"></span> System</span>
      <span><span style="display:inline-block;width:8px;height:8px;background:#3b82f6;border-radius:2px;vertical-align:middle;"></span> User</span>
      <span><span style="display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:2px;vertical-align:middle;"></span> Assistant</span>
      <span><span style="display:inline-block;width:8px;height:8px;background:#f97316;border-radius:2px;vertical-align:middle;"></span> Tool Results</span>
      <span><span style="display:inline-block;width:8px;height:8px;background:#f59e0b;border-radius:2px;vertical-align:middle;"></span> Compacted</span>
    </div>
  </div>
</div></body></html>
