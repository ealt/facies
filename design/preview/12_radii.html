<!doctype html>
<html class="dark"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .b { background: var(--muted); height: 80px; display:flex; align-items:flex-end; padding: 8px; font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); border: 1px solid var(--border); }
</style></head><body><div class="card">
  <div class="grid">
    <div class="b" style="border-radius:3px;">sw &middot; 3px</div>
    <div class="b" style="border-radius:6px;">sm &middot; 6px</div>
    <div class="b" style="border-radius:8px;">md &middot; 8px</div>
    <div class="b" style="border-radius:10px;">lg &middot; 10px</div>
  </div>
  <div class="section-title" style="margin-top:14px;">--radius: 0.625rem · 10px is the canonical card corner</div>
</div></body></html>
